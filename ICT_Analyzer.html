<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Analyzer</title>
<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #00d4ff;
    --bull: #00e5a0;
    --bear: #ff4466;
    --ob-bull: rgba(0,229,160,0.15);
    --ob-bear: rgba(255,68,102,0.15);
    --fvg-bull: rgba(0,212,255,0.12);
    --fvg-bear: rgba(255,150,0,0.12);
    --text: #c8c8e0;
    --muted: #555570;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: nowrap;
    overflow: hidden;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .symbol-btns {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .symbol-btns::-webkit-scrollbar { display: none; }

  .sym-btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .sym-btn:hover, .sym-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.08);
  }

  .tf-btns {
    display: flex;
    gap: 4px;
    margin-left: auto;
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tf-btns::-webkit-scrollbar { display: none; }
  .tf-btn {
    padding: 4px 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: all 0.15s;
  }
  .tf-btn:hover, .tf-btn.active {
    border-color: var(--bull);
    color: var(--bull);
    background: rgba(0,229,160,0.08);
  }

  /* LEGEND */
  .legend-bar {
    display: flex;
    gap: 16px;
    padding: 6px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 11px;
    flex-wrap: wrap;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    opacity: 1;
    transition: opacity 0.2s;
  }
  .leg-item.off { opacity: 0.3; }
  .leg-box {
    width: 14px;
    height: 10px;
    border-radius: 2px;
  }
  .leg-label { color: var(--muted); font-size: 11px; }

  /* CHART */
  #chart-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #chart { width: 100%; height: 100%; }

  /* BOTTOM PANEL */
  .bottom-panel {
    display: flex;
    gap: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    height: 56px;
  }

  .stat-box {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
    padding: 6px;
  }
  .stat-box:last-child { border-right: none; }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }
  .stat-val {
    font-size: 13px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    margin-top: 2px;
  }
  .bull { color: var(--bull); }
  .bear { color: var(--bear); }
  .neutral { color: var(--accent); }

  /* PRICE OVERLAY */
  .price-overlay {
    position: absolute;
    top: 10px;
    left: 10px;
    font-family: 'Space Mono', monospace;
    pointer-events: none;
    z-index: 10;
  }
  .price-main {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 20px rgba(0,212,255,0.3);
  }
  .price-change {
    font-size: 12px;
    margin-top: 2px;
  }

  /* STATUS */
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--bull);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .signal-toast {
    position: absolute;
    top: 60px;
    right: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    z-index: 20;
    max-width: 200px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .signal-toast.show { opacity: 1; }

  /* SIGNAL BADGE */
  .signal-badge {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    animation: badgePop 0.4s ease;
  }
  .signal-badge.show { display: flex; }
  .signal-badge.buy {
    background: rgba(0,229,160,0.15);
    border: 1px solid var(--bull);
    color: var(--bull);
  }
  .signal-badge.sell {
    background: rgba(255,68,102,0.15);
    border: 1px solid var(--bear);
    color: var(--bear);
  }
  .signal-badge.wait {
    background: rgba(0,212,255,0.08);
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  @keyframes badgePop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* KILLZONE BADGE */
  .killzone-badge {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    animation: badgePop 0.4s ease;
  }
  .killzone-badge.show { display: flex; }
  .killzone-badge.london {
    background: rgba(255,120,0,0.15);
    border: 1px solid #ff7800;
    color: #ff7800;
  }
  .killzone-badge.ny {
    background: rgba(255,200,0,0.15);
    border: 1px solid #ffc800;
    color: #ffc800;
  }

  /* AMD BADGE */
  .amd-badge {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    animation: badgePop 0.4s ease;
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.4);
    color: var(--bull);
  }
  .amd-badge.show { display: flex; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">◈ ICT</div>
  <div class="symbol-btns">
    <button class="sym-btn active" onclick="changeSymbol('BTCUSDT',this)">BTC</button>
    <button class="sym-btn" onclick="changeSymbol('ETHUSDT',this)">ETH</button>
    <button class="sym-btn" onclick="changeSymbol('SOLUSDT',this)">SOL</button>
    <button class="sym-btn" onclick="changeSymbol('XRPUSDT',this)">XRP</button>
    <button class="sym-btn" onclick="changeSymbol('BNBUSDT',this)">BNB</button>
  </div>
  <div id="signalBadge" class="signal-badge wait show">⏳ 대기</div>
  <div id="killzoneBadge" class="killzone-badge"></div>
  <div id="amdBadge" class="amd-badge"></div>
  <div class="tf-btns">
    <button class="tf-btn" onclick="changeTF('1m',this)">1m</button>
    <button class="tf-btn" onclick="changeTF('5m',this)">5m</button>
    <button class="tf-btn" onclick="changeTF('15m',this)">15m</button>
    <button class="tf-btn active" onclick="changeTF('1h',this)">1H</button>
    <button class="tf-btn" onclick="changeTF('4h',this)">4H</button>
    <button class="tf-btn" onclick="changeTF('1d',this)">1D</button>
  </div>
</div>

<div class="legend-bar">
  <div class="leg-item" id="leg-fvg-bull" onclick="toggleLayer('fvgBull')">
    <div class="leg-box" style="background:rgba(0,212,255,0.4);border:1px solid #00d4ff"></div>
    <span class="leg-label">강세 FVG</span>
  </div>
  <div class="leg-item" id="leg-fvg-bear" onclick="toggleLayer('fvgBear')">
    <div class="leg-box" style="background:rgba(255,150,0,0.4);border:1px solid #ff9600"></div>
    <span class="leg-label">약세 FVG</span>
  </div>
  <div class="leg-item" id="leg-ob-bull" onclick="toggleLayer('obBull')">
    <div class="leg-box" style="background:rgba(0,229,160,0.4);border:1px solid #00e5a0"></div>
    <span class="leg-label">강세 OB</span>
  </div>
  <div class="leg-item" id="leg-ob-bear" onclick="toggleLayer('obBear')">
    <div class="leg-box" style="background:rgba(255,68,102,0.4);border:1px solid #ff4466"></div>
    <span class="leg-label">약세 OB</span>
  </div>
  <div class="leg-item" id="leg-liq" onclick="toggleLayer('liq')">
    <div class="leg-box" style="background:rgba(180,130,255,0.4);border:1px solid #b482ff"></div>
    <span class="leg-label">유동성</span>
  </div>
  <div class="leg-item" id="leg-kz" onclick="toggleLayer('kz')">
    <div class="leg-box" style="background:linear-gradient(90deg,rgba(0,229,160,0.4) 33%,rgba(255,120,0,0.4) 33% 66%,rgba(255,200,0,0.4) 66%);border:1px solid #888"></div>
    <span class="leg-label">킬존</span>
  </div>
  <div class="leg-item" id="leg-htf" onclick="toggleLayer('htf')">
    <div class="leg-box" style="background:rgba(255,255,255,0.1);border:2px dashed #ffffff66"></div>
    <span class="leg-label">4H구간</span>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;font-size:11px;color:var(--muted)">
    <span class="status-dot"></span>LIVE
  </div>
</div>

<div id="chart-container">
  <div class="price-overlay">
    <div class="price-main" id="priceMain">--</div>
    <div class="price-change" id="priceChange">--</div>
  </div>
  <div id="chart"></div>
  <div class="signal-toast" id="signalToast"></div>
</div>

<div class="bottom-panel">
  <div class="stat-box">
    <div class="stat-label">FVG</div>
    <div class="stat-val neutral" id="statFVG">0</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">OB</div>
    <div class="stat-val neutral" id="statOB">0</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">유동성</div>
    <div class="stat-val neutral" id="statLiq">0</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">구조</div>
    <div class="stat-val neutral" id="statMSS">-</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">AMD</div>
    <div class="stat-val neutral" id="statAMD">-</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">바이어스</div>
    <div class="stat-val neutral" id="statBias">-</div>
  </div>
</div>

<script>
let chart, candleSeries;
let currentSymbol = 'BTCUSDT';
let currentTF = '1h';
let ws = null;
let candles = [];
let layers = { fvgBull: true, fvgBear: true, obBull: true, obBear: true, liq: true, kz: true, htf: true };

// ICT overlay series storage
let fvgBullSeries = [], fvgBearSeries = [], obBullSeries = [], obBearSeries = [], liqSeries = [];
let kzSeries = [];
let htfSeries = [];
let htfCandles = [];

// ─── CHART INIT ───────────────────────────────────────────
function initChart() {
  const container = document.getElementById('chart');
  chart = LightweightCharts.createChart(container, {
    layout: {
      background: { color: '#0a0a0f' },
      textColor: '#555570',
    },
    grid: {
      vertLines: { color: '#1a1a28' },
      horzLines: { color: '#1a1a28' },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#333355', width: 1, style: 3 },
      horzLine: { color: '#333355', width: 1, style: 3 },
    },
    rightPriceScale: { borderColor: '#1e1e2e', scaleMargins: { top: 0.08, bottom: 0.08 } },
    timeScale: { borderColor: '#1e1e2e', timeVisible: true, secondsVisible: false, timezone: 'Asia/Seoul' },
  });

  candleSeries = chart.addCandlestickSeries({
    upColor: '#00e5a0',
    downColor: '#ff4466',
    borderUpColor: '#00e5a0',
    borderDownColor: '#ff4466',
    wickUpColor: '#00e5a0',
    wickDownColor: '#ff4466',
  });

  window.addEventListener('resize', () => {
    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  });
}

// ─── DATA FETCH ───────────────────────────────────────────
async function fetchCandles(symbol, tf) {
  const limit = 200;
  const binanceUrl = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=${limit}`;
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(binanceUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(binanceUrl)}`,
    `https://proxy.cors.sh/${binanceUrl}`,
  ];
  let data = null;
  // 직접 연결 시도
  try {
    const res = await fetch(binanceUrl);
    if (res.ok) data = await res.json();
  } catch(e) {}
  // 프록시 순차 시도
  if (!data) {
    for (const proxy of proxies) {
      try {
        const res = await fetch(proxy);
        if (res.ok) { data = await res.json(); break; }
      } catch(e) {}
    }
  }
  if (!data) { alert('데이터 로드 실패\nBrave 설정 > 보안 > CORS 허용 필요'); return []; }
  return data.map(k => ({
    time: k[0] / 1000 + 9 * 3600,
    open: parseFloat(k[1]),
    high: parseFloat(k[2]),
    low: parseFloat(k[3]),
    close: parseFloat(k[4]),
  }));
}

async function loadChart() {
  clearOverlays();
  candles = await fetchCandles(currentSymbol, currentTF);
  candleSeries.setData(candles);
  updatePrice(candles[candles.length - 1]);

  // HTF 4H 데이터 로드 (현재가 5m/15m/1h일 때만)
  if (['1m','5m','15m','1h'].includes(currentTF)) {
    htfCandles = await fetchCandles(currentSymbol, '4h');
  } else {
    htfCandles = [];
  }

  analyzeICT(candles);
  connectWS();
}

// ─── WEBSOCKET ────────────────────────────────────────────
function connectWS() {
  if (ws) ws.close();
  const sym = currentSymbol.toLowerCase();
  ws = new WebSocket(`wss://stream.binance.com:9443/ws/${sym}@kline_${currentTF}`);
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data).k;
    const candle = {
      time: d.t / 1000 + 9 * 3600,
      open: parseFloat(d.o),
      high: parseFloat(d.h),
      low: parseFloat(d.l),
      close: parseFloat(d.c),
    };
    candleSeries.update(candle);
    if (d.x) { // closed candle
      candles.push(candle);
      if (candles.length > 300) candles.shift();
      analyzeICT(candles);
    }
    updatePrice(candle);
  };
}

// ─── PRICE DISPLAY ────────────────────────────────────────
function updatePrice(candle) {
  const el = document.getElementById('priceMain');
  const chEl = document.getElementById('priceChange');
  const price = candle.close;
  el.textContent = price > 1000
    ? price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    : price.toFixed(4);

  if (candles.length > 1) {
    const prev = candles[candles.length - 2]?.close || candles[0].open;
    const pct = ((price - prev) / prev * 100).toFixed(2);
    chEl.textContent = (pct >= 0 ? '+' : '') + pct + '%';
    chEl.style.color = pct >= 0 ? '#00e5a0' : '#ff4466';
  }
}

// ─── ICT ANALYSIS ─────────────────────────────────────────
function analyzeICT(data) {
  clearOverlays();
  if (data.length < 10) return;

  const fvgBull = [], fvgBear = [];
  const obBull = [], obBear = [];
  const liquidity = [];

  // FVG detection (last 100 candles)
  const start = Math.max(1, data.length - 50);
  for (let i = start; i < data.length - 1; i++) {
    const prev = data[i - 1];
    const curr = data[i];
    const next = data[i + 1];

    // Bullish FVG: prev.high < next.low (gap up)
    if (prev.high < next.low) {
      fvgBull.push({ time: curr.time, low: prev.high, high: next.low });
    }
    // Bearish FVG: prev.low > next.high (gap down)
    if (prev.low > next.high) {
      fvgBear.push({ time: curr.time, low: next.high, high: prev.low });
    }
  }

  // Order Block detection
  for (let i = start; i < data.length - 3; i++) {
    const curr = data[i];
    const next = data[i + 1];
    const next2 = data[i + 2];

    // Bullish OB: bearish candle followed by strong bullish move
    if (curr.close < curr.open) { // bearish candle
      if (next.close > curr.high || next2.close > curr.high) {
        obBull.push({ time: curr.time, low: curr.low, high: curr.high });
      }
    }
    // Bearish OB: bullish candle followed by strong bearish move
    if (curr.close > curr.open) { // bullish candle
      if (next.close < curr.low || next2.close < curr.low) {
        obBear.push({ time: curr.time, low: curr.low, high: curr.high });
      }
    }
  }

  // Liquidity: swing highs/lows
  for (let i = 3; i < data.length - 3; i++) {
    const c = data[i];
    const isSwingHigh = data[i-1].high < c.high && data[i-2].high < c.high &&
                        data[i+1].high < c.high && data[i+2].high < c.high;
    const isSwingLow  = data[i-1].low > c.low && data[i-2].low > c.low &&
                        data[i+1].low > c.low && data[i+2].low > c.low;
    if (isSwingHigh) liquidity.push({ time: c.time, price: c.high, type: 'high' });
    if (isSwingLow)  liquidity.push({ time: c.time, price: c.low, type: 'low' });
  }

  // MSS detection
  const mss = detectMSS(data);

  // Bias
  const bias = detectBias(data);

  // AMD detection
  const amd = detectAMD(data);

  // Killzone
  drawKillzones(data);

  // HTF 4H OB/FVG
  drawHTF(data);

  // Draw overlays
  drawFVG(fvgBull, fvgBear, data);
  drawOB(obBull, obBear, data);
  drawLiquidity(liquidity);

  // Stats
  document.getElementById('statFVG').textContent = fvgBull.length + fvgBear.length;
  document.getElementById('statOB').textContent = obBull.length + obBear.length;
  document.getElementById('statLiq').textContent = liquidity.length;
  const mssEl = document.getElementById('statMSS');
  mssEl.textContent = mss;
  mssEl.className = 'stat-val ' + (mss === '상승' ? 'bull' : mss === '하락' ? 'bear' : 'neutral');
  const amdEl = document.getElementById('statAMD');
  amdEl.textContent = amd.phase;
  amdEl.className = 'stat-val ' + (amd.phase === '배분' ? 'bull' : amd.phase === '조작' ? 'bear' : 'neutral');
  const biasEl = document.getElementById('statBias');
  biasEl.textContent = bias;
  biasEl.className = 'stat-val ' + (bias === '매수' ? 'bull' : bias === '매도' ? 'bear' : 'neutral');

  // AMD badge
  const amdBadge = document.getElementById('amdBadge');
  const amdIcons = { '축적': '🔵 축적', '조작': '🔴 조작', '배분': '🟢 배분' };
  if (amdIcons[amd.phase]) {
    amdBadge.textContent = amdIcons[amd.phase];
    amdBadge.className = 'amd-badge show';
  } else {
    amdBadge.className = 'amd-badge';
  }

  // Signal detection
  detectSignal(data, fvgBull, fvgBear, obBull, obBear, bias);
}

function detectSignal(data, fvgBull, fvgBear, obBull, obBear, bias) {
  const last = data[data.length - 1];
  const price = last.close;
  const badge = document.getElementById('signalBadge');

  let signal = 'wait';
  let label = '⏳ 대기';

  if (bias === '매수') {
    const inFVG = fvgBull.slice(-5).some(z => price >= z.low && price <= z.high);
    const inOB  = obBull.slice(-4).some(z => price >= z.low && price <= z.high);
    if (inFVG || inOB) { signal = 'buy'; label = '🟢 매수'; }
  } else if (bias === '매도') {
    const inFVG = fvgBear.slice(-5).some(z => price >= z.low && price <= z.high);
    const inOB  = obBear.slice(-4).some(z => price >= z.low && price <= z.high);
    if (inFVG || inOB) { signal = 'sell'; label = '🔴 매도'; }
  }

  badge.className = `signal-badge show ${signal}`;
  badge.textContent = label;
}

// ─── HTF 4H OB/FVG ───────────────────────────────────────
function drawHTF(data) {
  // 기존 HTF 제거
  htfSeries.forEach(s => {
    if (s && s.top) { try { chart.removeSeries(s.top); } catch(e){} }
    if (s && s.bot) { try { chart.removeSeries(s.bot); } catch(e){} }
  });
  htfSeries = [];
  if (!layers.htf || htfCandles.length < 10) return;
  if (!['1m','5m','15m','1h'].includes(currentTF)) return;

  const price = data[data.length - 1].close;
  const lastTime = data[data.length - 1].time;
  const hData = htfCandles;

  // 4H FVG
  const htfFvgBull = [], htfFvgBear = [];
  for (let i = 1; i < hData.length - 1; i++) {
    const prev = hData[i-1], curr = hData[i], next = hData[i+1];
    if (prev.high < next.low) htfFvgBull.push({ time: curr.time, low: prev.high, high: next.low });
    if (prev.low > next.high) htfFvgBear.push({ time: curr.time, low: next.high, high: prev.low });
  }

  // 4H OB
  const htfObBull = [], htfObBear = [];
  for (let i = 1; i < hData.length - 2; i++) {
    const curr = hData[i], next = hData[i+1], next2 = hData[i+2];
    if (curr.close < curr.open && (next.close > curr.high || next2.close > curr.high))
      htfObBull.push({ low: curr.low, high: curr.high });
    if (curr.close > curr.open && (next.close < curr.low || next2.close < curr.low))
      htfObBear.push({ low: curr.low, high: curr.high });
  }

  // 현재가 아래 4H 강세 OB 1개
  const belowOB = htfObBull.filter(z => z.high < price).sort((a,b) => b.high - a.high)[0];
  if (belowOB) {
    const s = addHTFBox(lastTime, belowOB.low, belowOB.high, 'rgba(0,229,160,0.06)', '#00e5a0');
    htfSeries.push(s);
  }

  // 현재가 위 4H 약세 OB 1개
  const aboveOB = htfObBear.filter(z => z.low > price).sort((a,b) => a.low - b.low)[0];
  if (aboveOB) {
    const s = addHTFBox(lastTime, aboveOB.low, aboveOB.high, 'rgba(255,68,102,0.06)', '#ff4466');
    htfSeries.push(s);
  }

  // 현재가 아래 4H 강세 FVG 1개
  const belowFVG = htfFvgBull.filter(z => z.high < price).sort((a,b) => b.high - a.high)[0];
  if (belowFVG) {
    const s = addHTFBox(lastTime, belowFVG.low, belowFVG.high, 'rgba(0,180,255,0.06)', '#00b4ff');
    htfSeries.push(s);
  }

  // 현재가 위 4H 약세 FVG 1개
  const aboveFVG = htfFvgBear.filter(z => z.low > price).sort((a,b) => a.low - b.low)[0];
  if (aboveFVG) {
    const s = addHTFBox(lastTime, aboveFVG.low, aboveFVG.high, 'rgba(255,140,0,0.06)', '#ff8c00');
    htfSeries.push(s);
  }
}

function addHTFBox(lastTime, low, high, fillColor, lineColor) {
  // 차트 시작부터 현재까지 넓게 표시
  const startTime = lastTime - 86400 * 7; // 7일 전부터
  const top = chart.addLineSeries({
    color: lineColor,
    lineWidth: 2,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    lastValueVisible: false,
    priceLineVisible: false,
    crosshairMarkerVisible: false,
    title: '4H',
  });
  top.setData([{ time: startTime, value: high }, { time: lastTime, value: high }]);

  const bot = chart.addLineSeries({
    color: lineColor,
    lineWidth: 2,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    lastValueVisible: false,
    priceLineVisible: false,
    crosshairMarkerVisible: false,
  });
  bot.setData([{ time: startTime, value: low }, { time: lastTime, value: low }]);

  return { top, bot };
}

// ─── KILLZONE ─────────────────────────────────────────────
function drawKillzones(data) {
  // 기존 킬존 제거
  kzSeries.forEach(s => {
    if (s && s.top) { try { chart.removeSeries(s.top); } catch(e){} }
    if (s && s.bot) { try { chart.removeSeries(s.bot); } catch(e){} }
  });
  kzSeries = [];
  if (!layers.kz) return;

  // 킬존 정의 (UTC 기준)
  // 아시아: 00:00~03:00 UTC (한국 09:00~12:00)
  // 런던:   07:00~10:00 UTC (한국 16:00~19:00)
  // 뉴욕:   13:00~16:00 UTC (한국 22:00~01:00)
  const kzDefs = [
    { label: '🇬🇧 런던',  startH: 7,  endH: 10, color: 'rgba(255,120,0,0.08)',  lineColor: '#ff7800' },
    { label: '🇺🇸 뉴욕',  startH: 13, endH: 16, color: 'rgba(255,200,0,0.08)', lineColor: '#ffc800' },
  ];

  // 현재 킬존 뱃지 업데이트
  const nowUTC = new Date();
  const utcHour = nowUTC.getUTCHours();
  const kzBadge = document.getElementById('killzoneBadge');
  let currentKZ = null;
  kzDefs.forEach(kz => {
    if (utcHour >= kz.startH && utcHour < kz.endH) currentKZ = kz;
  });

  if (currentKZ) {
    kzBadge.textContent = currentKZ.label + ' 킬존';
    kzBadge.className = 'killzone-badge show ' +
      (currentKZ.label.includes('아시아') ? 'asia' : currentKZ.label.includes('런던') ? 'london' : 'ny');
  } else {
    kzBadge.className = 'killzone-badge';
  }

  // 차트에 최근 7일 킬존 음영 표시
  if (data.length < 2) return;
  const tf = currentTF;
  // 분봉/시봉에서만 킬존 의미있음
  if (!['1m','5m','15m','1h'].includes(tf)) return;

  const lastTime = data[data.length - 1].time;
  const firstTime = data[0].time;

  // 하루를 초 단위로
  const daySeconds = 86400;
  const kstOffset = 9 * 3600;

  // 데이터 범위 내 킬존 박스 그리기
  let dayStart = Math.floor(firstTime / daySeconds) * daySeconds;
  while (dayStart < lastTime) {
    kzDefs.forEach(kz => {
      const kzStart = dayStart + kz.startH * 3600;
      const kzEnd   = dayStart + kz.endH * 3600;
      if (kzEnd < firstTime || kzStart > lastTime) return;

      // 가격 범위는 차트 전체 (임시 극값)
      const prices = data.filter(c => c.time >= kzStart && c.time <= kzEnd);
      if (prices.length === 0) return;
      const hi = Math.max(...prices.map(c => c.high));
      const lo = Math.min(...prices.map(c => c.low));
      if (hi === lo) return;

      const s = addBoxSeries(kzStart, Math.min(kzEnd, lastTime), lo * 0.999, hi * 1.001, kz.color, kz.lineColor, 1);
      kzSeries.push(s);
    });
    dayStart += daySeconds;
  }
}

// ─── AMD DETECTION ────────────────────────────────────────
function detectAMD(data) {
  // 하루(24봉 기준 1H, 288봉 기준 5m) 내 AMD 판단
  if (data.length < 10) return { phase: '-' };

  // 최근 봉 기준으로 하루 AMD 패턴 분석
  // 아시아장(축적) → 런던(조작) → 뉴욕(배분) 흐름
  const now = data[data.length - 1].time;
  const utcHour = new Date(now * 1000).getUTCHours();

  // 아시아: 00~03 UTC, 런던: 07~10 UTC, 뉴욕: 13~16 UTC
  let phase = '-';
  if (utcHour >= 0 && utcHour < 3) {
    phase = '축적';
  } else if (utcHour >= 7 && utcHour < 10) {
    phase = '조작';
  } else if (utcHour >= 13 && utcHour < 16) {
    phase = '배분';
  }

  // 추가로 최근 변동성으로 보정
  const recent10 = data.slice(-10);
  const hi = Math.max(...recent10.map(c => c.high));
  const lo = Math.min(...recent10.map(c => c.low));
  const range = (hi - lo) / lo * 100;

  // 변동성 낮으면 축적 가능성
  if (range < 0.3 && phase === '-') phase = '축적';

  return { phase, range: range.toFixed(2) };
}

// MSS: Market Structure Shift
function detectMSS(data) {
  if (data.length < 20) return '-';
  const recent = data.slice(-20);
  const highs = recent.map(c => c.high);
  const lows  = recent.map(c => c.low);
  const lastClose = data[data.length - 1].close;
  const prevHigh = Math.max(...highs.slice(0, -3));
  const prevLow  = Math.min(...lows.slice(0, -3));

  if (lastClose > prevHigh) return '상승';
  if (lastClose < prevLow) return '하락';
  return '중립';
}

// Bias based on recent structure
function detectBias(data) {
  if (data.length < 30) return '-';
  const slice = data.slice(-30);
  let upMoves = 0, downMoves = 0;
  for (let i = 1; i < slice.length; i++) {
    if (slice[i].close > slice[i-1].close) upMoves++;
    else downMoves++;
  }
  if (upMoves > downMoves * 1.3) return '매수';
  if (downMoves > upMoves * 1.3) return '매도';
  return '중립';
}

// ─── DRAWING ──────────────────────────────────────────────
function drawFVG(bull, bear, data) {
  const lastTime = data[data.length - 1].time;
  const price = data[data.length - 1].close;

  // 현재가 바로 위 강세 FVG 2개
  const aboveBulls = bull.filter(z => z.low > price).sort((a,b) => a.low - b.low).slice(0,2);
  aboveBulls.forEach(fvg => {
    if (!layers.fvgBull) return;
    const s = addBoxSeries(fvg.time, lastTime, fvg.low, fvg.high, 'rgba(0,180,255,0.25)', '#00b4ff', 2);
    fvgBullSeries.push(s);
  });

  // 현재가 바로 아래 약세 FVG 2개
  const belowBears = bear.filter(z => z.high < price).sort((a,b) => b.high - a.high).slice(0,2);
  belowBears.forEach(fvg => {
    if (!layers.fvgBear) return;
    const s = addBoxSeries(fvg.time, lastTime, fvg.low, fvg.high, 'rgba(255,140,0,0.25)', '#ff8c00', 2);
    fvgBearSeries.push(s);
  });
}

function drawOB(bull, bear, data) {
  const lastTime = data[data.length - 1].time;
  const price = data[data.length - 1].close;

  // 현재가 바로 아래 강세 OB 1개
  const belowBull = bull.filter(z => z.high < price).sort((a,b) => b.high - a.high)[0];
  if (belowBull && layers.obBull) {
    const s = addBoxSeries(belowBull.time, lastTime, belowBull.low, belowBull.high, 'rgba(0,220,120,0.25)', '#00dc78', 2);
    obBullSeries.push(s);
  }

  // 현재가 바로 위 약세 OB 1개
  const aboveBear = bear.filter(z => z.low > price).sort((a,b) => a.low - b.low)[0];
  if (aboveBear && layers.obBear) {
    const s = addBoxSeries(aboveBear.time, lastTime, aboveBear.low, aboveBear.high, 'rgba(255,50,80,0.25)', '#ff3250', 2);
    obBearSeries.push(s);
  }
}

function drawLiquidity(liquidity) {
  if (!layers.liq) return;
  const recent = liquidity.slice(-6);
  recent.forEach(liq => {
    const line = candleSeries.createPriceLine({
      price: liq.price,
      color: 'rgba(180,130,255,0.4)',
      lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: false,
      title: liq.type === 'high' ? '↑ LH' : '↓ LL',
    });
    liqSeries.push(line);
  });
}

// 2-line box (top=solid, bot=dashed)
function addBoxSeries(t1, t2, low, high, fillColor, lineColor, lw=2) {
  const topLine = chart.addLineSeries({
    color: lineColor,
    lineWidth: lw,
    lineStyle: LightweightCharts.LineStyle.Solid,
    lastValueVisible: false,
    priceLineVisible: false,
    crosshairMarkerVisible: false,
  });
  topLine.setData([{ time: t1, value: high }, { time: t2, value: high }]);

  const botLine = chart.addLineSeries({
    color: lineColor,
    lineWidth: lw,
    lineStyle: LightweightCharts.LineStyle.Solid,
    lastValueVisible: false,
    priceLineVisible: false,
    crosshairMarkerVisible: false,
  });
  botLine.setData([{ time: t1, value: low }, { time: t2, value: low }]);

  return { top: topLine, bot: botLine };
}

function clearOverlays() {
  [...fvgBullSeries, ...fvgBearSeries, ...obBullSeries, ...obBearSeries, ...kzSeries, ...htfSeries].forEach(s => {
    if (s && s.top) { try { chart.removeSeries(s.top); } catch(e){} }
    if (s && s.bot) { try { chart.removeSeries(s.bot); } catch(e){} }
  });
  fvgBullSeries = []; fvgBearSeries = []; obBullSeries = []; obBearSeries = []; kzSeries = []; htfSeries = [];

  liqSeries.forEach(line => { try { candleSeries.removePriceLine(line); } catch(e){} });
  liqSeries = [];
}

  document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSymbol = sym;
  loadChart();
}

function changeTF(tf, btn) {
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTF = tf;
  loadChart();
}

function toggleLayer(name) {
  layers[name] = !layers[name];
  const legMap = {
    fvgBull: 'leg-fvg-bull',
    fvgBear: 'leg-fvg-bear',
    obBull: 'leg-ob-bull',
    obBear: 'leg-ob-bear',
    liq: 'leg-liq',
    kz: 'leg-kz',
    htf: 'leg-htf',
  };
  const el = document.getElementById(legMap[name]);
  if (el) el.classList.toggle('off', !layers[name]);
  analyzeICT(candles);
}
